<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Facturas</title>
  <style>
    :root {
      --ui-bg: #f4f5f7;
      --ui-panel: #ffffff;
      --ui-border: #e2e4e9;
      --ui-text: #20242c;
      --ui-muted: #767c8a;
      --ui-accent: #2f6fed;
      --ui-accent-hover: #2159c4;
      --ui-danger: #e14b4b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--ui-bg);
      color: var(--ui-text);
    }

    .app {
      display: grid;
      grid-template-columns: 400px 1fr;
      min-height: 100vh;
    }

    /* ---------- Sidebar / Form ---------- */
    .sidebar {
      background: var(--ui-panel);
      border-right: 1px solid var(--ui-border);
      padding: 20px;
      overflow-y: auto;
      max-height: 100vh;
      position: sticky;
      top: 0;
    }

    .sidebar h1 {
      font-size: 17px;
      margin: 0 0 4px;
    }

    .sidebar .subtitle {
      font-size: 12.5px;
      color: var(--ui-muted);
      margin: 0 0 18px;
    }

    .template-switch {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .template-switch button {
      flex: 1;
      padding: 10px 8px;
      border-radius: 10px;
      border: 1.5px solid var(--ui-border);
      background: #fafbfc;
      cursor: pointer;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--ui-muted);
      transition: .15s;
      text-align: center;
      line-height: 1.3;
    }

    .template-switch button.active {
      border-color: var(--ui-accent);
      background: #eaf1ff;
      color: var(--ui-accent);
    }

    fieldset {
      border: 1px solid var(--ui-border);
      border-radius: 10px;
      margin: 0 0 16px;
      padding: 12px 14px 14px;
    }

    fieldset legend {
      font-size: 11.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--ui-muted);
      padding: 0 6px;
    }

    .field {
      margin-bottom: 10px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #4a4f5a;
      margin-bottom: 4px;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      padding: 7px 9px;
      border: 1px solid var(--ui-border);
      border-radius: 7px;
      font-size: 13px;
      font-family: inherit;
      color: var(--ui-text);
      background: #fff;
    }

    .field textarea {
      resize: vertical;
      min-height: 50px;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      outline: 2px solid #cddcfb;
      border-color: var(--ui-accent);
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .field-row.three {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .item-row {
      display: grid;
      grid-template-columns: 1fr 46px 74px 22px;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }

    .item-row input {
      padding: 6px 7px;
      font-size: 12.5px;
    }

    .item-remove {
      border: none;
      background: none;
      color: var(--ui-danger);
      font-size: 17px;
      cursor: pointer;
      line-height: 1;
      padding: 0;
    }

    .add-item-btn {
      width: 100%;
      padding: 8px;
      border: 1.5px dashed var(--ui-border);
      background: #fafbfc;
      border-radius: 8px;
      color: var(--ui-accent);
      font-weight: 600;
      font-size: 12.5px;
      cursor: pointer;
      margin-top: 2px;
    }

    .add-item-btn:hover {
      background: #eef3ff;
    }

    .item-col-labels {
      display: grid;
      grid-template-columns: 1fr 46px 74px 22px;
      gap: 6px;
      font-size: 10.5px;
      color: var(--ui-muted);
      text-transform: uppercase;
      letter-spacing: .03em;
      margin-bottom: 6px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }

    .btn {
      padding: 11px 14px;
      border-radius: 9px;
      border: none;
      font-size: 13.5px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
    }

    .btn-primary {
      background: var(--ui-accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--ui-accent-hover);
    }

    .btn-secondary {
      background: #fff;
      color: var(--ui-muted);
      border: 1px solid var(--ui-border);
    }

    .btn-secondary:hover {
      background: #f2f3f5;
    }

    [data-only] {
      display: none;
    }

    /* ---------- Preview area ---------- */
    .preview-area {
      padding: 36px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .preview-shell {
      width: 100%;
      max-width: 820px;
    }

    /* ============================================================
     TEMPLATE: MEXICO
     ============================================================ */
    .invoice.mx {
      --mx-orange: #e8622a;
      --mx-navy: #1c2431;
      --mx-peach: #fbe4d4;
      --mx-gray: #8a92a3;
      --mx-line: #ececef;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 1px 3px rgba(20, 20, 30, .08), 0 12px 30px rgba(20, 20, 30, .06);
      overflow: hidden;
    }

    .invoice.mx .mx-topbar {
      height: 7px;
      background: linear-gradient(90deg, var(--mx-orange), #f0935f);
    }

    .invoice.mx .mx-card {
      padding: 34px 40px 30px;
    }

    .invoice.mx .mx-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 22px;
    }

    .invoice.mx .mx-head h1 {
      font-size: 30px;
      margin: 0 0 6px;
      letter-spacing: .01em;
    }

    .invoice.mx .mx-meta {
      font-size: 12.5px;
      color: var(--mx-gray);
    }

    .invoice.mx .mx-flag-block {
      text-align: right;
    }

    .invoice.mx .mx-flag {
      width: 38px;
      height: 26px;
      display: flex;
      margin-left: auto;
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid #e3e3e3;
    }

    .invoice.mx .mx-flag span {
      flex: 1;
    }

    .invoice.mx .mx-flag span:nth-child(1) {
      background: #006341;
    }

    .invoice.mx .mx-flag span:nth-child(2) {
      background: #fff;
    }

    .invoice.mx .mx-flag span:nth-child(3) {
      background: #ce1126;
    }

    .invoice.mx .mx-country {
      font-weight: 700;
      font-size: 13px;
      margin-top: 5px;
    }

    .invoice.mx .mx-currency {
      font-size: 11.5px;
      color: var(--mx-gray);
    }

    .invoice.mx .mx-parties {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 18px 0;
      border-top: 1px solid var(--mx-line);
      border-bottom: 1px solid var(--mx-line);
      margin-bottom: 22px;
    }

    .invoice.mx .party-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .05em;
      margin-bottom: 6px;
    }

    .invoice.mx .party-label.seller {
      color: var(--mx-orange);
    }

    .invoice.mx .party-label.buyer {
      color: var(--mx-gray);
    }

    .invoice.mx .party-name {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 3px;
    }

    .invoice.mx .party-sub {
      font-size: 12.5px;
      color: var(--mx-gray);
      line-height: 1.5;
    }

    .invoice.mx table.mx-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 18px;
    }

    .invoice.mx table.mx-table thead th {
      background: var(--mx-navy);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      text-align: right;
      padding: 11px 14px;
    }

    .invoice.mx table.mx-table thead th:first-child {
      text-align: left;
      border-radius: 8px 0 0 0;
    }

    .invoice.mx table.mx-table thead th:last-child {
      border-radius: 0 8px 0 0;
    }

    .invoice.mx table.mx-table tbody td {
      padding: 12px 14px;
      font-size: 13px;
      border-bottom: 1px solid var(--mx-line);
      text-align: right;
    }

    .invoice.mx table.mx-table tbody td:first-child {
      text-align: left;
    }

    .invoice.mx .mx-totals {
      margin-left: auto;
      width: 280px;
    }

    .invoice.mx .mx-totals .row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--mx-gray);
      padding: 6px 4px;
    }

    .invoice.mx .mx-totals .row.total {
      background: var(--mx-peach);
      color: var(--mx-navy);
      font-weight: 700;
      font-size: 15px;
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 6px;
    }

    .invoice.mx .mx-totals .row.total span:last-child {
      color: var(--mx-orange);
    }

    /* ============================================================
     TEMPLATE: ESTRELLA
     ============================================================ */
    .invoice.estrella {
      --est-bluegray: #7c8791;
      --est-olive: #b7ae92;
      --est-dark: #5b6870;
      --est-salmon: #f2c6bc;
      --est-salmon-light: #fbeeec;
      --est-text: #3d3d3d;
      --est-muted: #767676;
      font-family: Georgia, "Times New Roman", serif;
      background: #fff;
      box-shadow: 0 1px 3px rgba(20, 20, 30, .08), 0 12px 30px rgba(20, 20, 30, .06);
      overflow: hidden;
      color: var(--est-text);
    }

    .invoice.estrella .est-header {
      background: #c3cbcb;
      padding: 26px 34px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .invoice.estrella .est-brand {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .invoice.estrella .est-logo {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .invoice.estrella .est-company {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 4px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .invoice.estrella .est-line {
      font-size: 11.5px;
      color: #3d4548;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5;
    }

    .invoice.estrella .est-invoice-word {
      font-size: 38px;
      font-weight: 700;
      color: #e0e5e5;
      letter-spacing: .03em;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .invoice.estrella .est-bar {
      display: flex;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .invoice.estrella .est-bar>div {
      padding: 11px 34px;
      font-size: 12.5px;
      color: #fff;
      font-weight: 600;
    }

    .invoice.estrella .est-bar-left {
      background: var(--est-dark);
      flex: 1.4;
    }

    .invoice.estrella .est-bar-right {
      background: var(--est-olive);
      flex: 1;
    }

    .invoice.estrella .est-client {
      margin: 22px 34px 0;
      border: 1px solid #d8d8d8;
      border-radius: 2px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 12.5px;
    }

    .invoice.estrella .est-client .row {
      display: flex;
      border-bottom: 1px solid #d8d8d8;
      padding: 7px 12px;
    }

    .invoice.estrella .est-client .row:last-child {
      border-bottom: none;
    }

    .invoice.estrella .est-client .row.highlight {
      background: #e7ebeb;
    }

    .invoice.estrella .est-client .lbl {
      width: 100px;
      flex-shrink: 0;
      color: #444;
    }

    .invoice.estrella .est-section-title {
      margin: 22px 34px 8px;
      font-size: 12.5px;
      color: #444;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .invoice.estrella table.est-table {
      width: calc(100% - 68px);
      margin: 0 34px;
      border-collapse: collapse;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 12.5px;
    }

    .invoice.estrella table.est-table thead th {
      background: var(--est-salmon);
      padding: 9px 10px;
      font-weight: 700;
      text-align: center;
      border: 1px solid #e3b6ab;
    }

    .invoice.estrella table.est-table thead th:nth-child(2) {
      text-align: left;
    }

    .invoice.estrella table.est-table thead th:nth-child(3),
    .invoice.estrella table.est-table thead th:nth-child(4) {
      text-align: right;
    }

    .invoice.estrella table.est-table tbody td {
      padding: 9px 10px;
      border: 1px solid #eee0dd;
      background: var(--est-salmon-light);
    }

    .invoice.estrella table.est-table tbody td:first-child {
      text-align: center;
      width: 40px;
    }

    .invoice.estrella table.est-table tbody td:nth-child(3),
    .invoice.estrella table.est-table tbody td:nth-child(4) {
      text-align: right;
      white-space: nowrap;
    }

    .invoice.estrella .est-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin: 0 34px 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 12.5px;
    }

    .invoice.estrella .est-payment {
      max-width: 260px;
      padding-top: 14px;
      color: #444;
      white-space: pre-line;
      line-height: 1.5;
    }

    .invoice.estrella .est-totals {
      width: 300px;
    }

    .invoice.estrella .est-totals .row {
      display: flex;
      justify-content: space-between;
      padding: 7px 10px;
      border: 1px solid #eee0dd;
      border-top: none;
    }

    .invoice.estrella .est-totals .row:first-child {
      border-top: 1px solid #eee0dd;
    }

    .invoice.estrella .est-totals .row.total {
      background: var(--est-salmon);
      font-weight: 700;
    }

    .invoice.estrella .est-footer {
      text-align: center;
      padding: 10px 34px 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .invoice.estrella .est-footer p {
      font-size: 10.5px;
      color: var(--est-muted);
      margin: 0 0 10px;
    }

    .invoice.estrella .est-wordmark {
      font-weight: 700;
      letter-spacing: .08em;
      font-size: 13px;
      color: #333;
    }

    .invoice.estrella .est-bottombar {
      height: 10px;
      display: flex;
    }

    .invoice.estrella .est-bottombar span {
      flex: 1;
    }

    .invoice.estrella .est-bottombar span:nth-child(1) {
      background: var(--est-bluegray);
    }

    .invoice.estrella .est-bottombar span:nth-child(2) {
      background: var(--est-olive);
    }

    .invoice.estrella .est-bottombar span:nth-child(3) {
      background: var(--est-dark);
    }

    @media (max-width:900px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: relative;
        max-height: none;
      }
    }

    /* ---------- Print / PDF export ---------- */
    @page {
      size: A4;
      margin: 12mm;
    }

    @media print {
      body {
        background: #fff;
      }

      .sidebar,
      .preview-area {
        padding: 0;
      }

      .app {
        display: block;
      }

      .sidebar {
        display: none;
      }

      .preview-area {
        display: block;
        justify-content: unset;
      }

      .preview-shell {
        max-width: none;
      }

      .invoice {
        box-shadow: none !important;
        border-radius: 0 !important;
      }
    }
  </style>
</head>

<body>

  <div class="app">
    <div class="sidebar">
      <h1>Generador de Facturas</h1>
      <p class="subtitle">Elige una plantilla, completa los datos y descarga el HTML final. Nada se guarda en ningún
        servidor.</p>

      <div class="template-switch">
        <button type="button" id="btn-tpl-mx" class="active">🇲🇽 México</button>
        <button type="button" id="btn-tpl-estrella">Estrella (LatAm)</button>
      </div>

      <form id="invoice-form" autocomplete="off">

        <fieldset>
          <legend>Datos generales</legend>
          <div class="field-row">
            <div class="field">
              <label for="f-number">No. de factura</label>
              <input id="f-number" name="number" type="text">
            </div>
            <div class="field">
              <label for="f-date">Fecha</label>
              <input id="f-date" name="date" type="text">
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="f-currency-code">Moneda (código)</label>
              <input id="f-currency-code" name="currencyCode" type="text">
            </div>
            <div class="field">
              <label for="f-currency-symbol">Prefijo a mostrar</label>
              <input id="f-currency-symbol" name="currencySymbol" type="text">
            </div>
          </div>
          <div class="field" data-only="mx">
            <label for="f-country">País (etiqueta visible)</label>
            <input id="f-country" name="country" type="text">
          </div>
        </fieldset>

        <fieldset>
          <legend>Emisor</legend>
          <div class="field">
            <label for="f-issuer-name">Nombre / Empresa</label>
            <input id="f-issuer-name" name="issuerName" type="text">
          </div>
          <div class="field">
            <label for="f-issuer-address">Dirección / subtítulo</label>
            <input id="f-issuer-address" name="issuerAddress" type="text">
          </div>
          <div class="field" data-only="estrella">
            <label for="f-issuer-contact">Contacto (email · web)</label>
            <input id="f-issuer-contact" name="issuerContact" type="text">
          </div>
          <div class="field-row">
            <div class="field">
              <label for="f-issuer-tax-label">Etiqueta ID fiscal</label>
              <input id="f-issuer-tax-label" name="issuerTaxLabel" type="text">
            </div>
            <div class="field">
              <label for="f-issuer-tax-value">Valor ID fiscal</label>
              <input id="f-issuer-tax-value" name="issuerTaxValue" type="text">
            </div>
          </div>
        </fieldset>

        <fieldset>
          <legend>Cliente</legend>
          <div class="field">
            <label for="f-client-name">Nombre / Empresa</label>
            <input id="f-client-name" name="clientName" type="text">
          </div>
          <div class="field">
            <label for="f-client-address">Dirección / subtítulo</label>
            <input id="f-client-address" name="clientAddress" type="text">
          </div>
          <div class="field-row">
            <div class="field">
              <label for="f-client-tax-label">Etiqueta ID fiscal</label>
              <input id="f-client-tax-label" name="clientTaxLabel" type="text">
            </div>
            <div class="field">
              <label for="f-client-tax-value">Valor ID fiscal</label>
              <input id="f-client-tax-value" name="clientTaxValue" type="text">
            </div>
          </div>
          <div class="field" data-only="estrella">
            <label for="f-client-email">Email</label>
            <input id="f-client-email" name="clientEmail" type="text">
          </div>
        </fieldset>

        <fieldset>
          <legend>Conceptos</legend>
          <div class="item-col-labels">
            <span>Descripción</span><span>Cant.</span><span>P. unit.</span><span></span>
          </div>
          <div id="items-container"></div>
          <button type="button" class="add-item-btn" id="btn-add-item">+ Agregar línea</button>
        </fieldset>

        <fieldset>
          <legend>Impuesto</legend>
          <div class="field-row">
            <div class="field">
              <label for="f-tax-name">Nombre (IVA / VAT / Tax)</label>
              <input id="f-tax-name" name="taxName" type="text">
            </div>
            <div class="field">
              <label for="f-tax-rate">Tasa %</label>
              <input id="f-tax-rate" name="taxRate" type="number" step="0.01">
            </div>
          </div>
        </fieldset>

        <fieldset data-only="estrella">
          <legend>Pago y notas</legend>
          <div class="field">
            <label for="f-payment">Forma de pago</label>
            <textarea id="f-payment" name="paymentMethod"></textarea>
          </div>
          <div class="field">
            <label for="f-footer-note">Nota al pie</label>
            <textarea id="f-footer-note" name="footerNote"></textarea>
          </div>
        </fieldset>

      </form>

      <div class="actions">
        <button type="button" class="btn btn-primary" id="btn-export-pdf">🖨 Exportar a PDF</button>
        <button type="button" class="btn btn-secondary" id="btn-example">Cargar datos de ejemplo</button>
      </div>
    </div>

    <div class="preview-area">
      <div class="preview-shell" id="preview"></div>
    </div>
  </div>

  <script>
    (function () {

      // ---------------------------------------------------------------
      // State
      // ---------------------------------------------------------------
      var state = {
        template: 'mx',
        number: '', date: '', currencyCode: '', currencySymbol: '', country: '',
        issuerName: '', issuerAddress: '', issuerContact: '', issuerTaxLabel: '', issuerTaxValue: '',
        clientName: '', clientAddress: '', clientTaxLabel: '', clientTaxValue: '', clientEmail: '',
        taxName: '', taxRate: 0,
        paymentMethod: '', footerNote: '',
        items: []
      };

      var EXAMPLES = {
        mx: {
          template: 'mx', number: 'INV-2026-0042', date: '2026-06-09', currencyCode: 'MXN', currencySymbol: 'MX$', country: 'Mexico',
          issuerName: 'Local Supplier Co.', issuerAddress: 'Established in Mexico', issuerContact: '',
          issuerTaxLabel: 'RFC', issuerTaxValue: 'MX123456789',
          clientName: 'Overseas Buyer Ltd', clientAddress: 'Export customer, abroad',
          clientTaxLabel: 'Foreign tax ID', clientTaxValue: '', clientEmail: '',
          taxName: 'VAT', taxRate: 16, paymentMethod: '', footerNote: '',
          items: [
            { description: 'Professional services', qty: 2, unitPrice: 450 },
            { description: 'Goods — 3 units', qty: 3, unitPrice: 100 }
          ]
        },
        estrella: {
          template: 'estrella', number: '2026/0001', date: '20/04/2026', currencyCode: 'USD', currencySymbol: 'USD ', country: '',
          issuerName: 'Estrella Sepúlveda', issuerAddress: 'Calle 102 No. 1421 - Guernica - Bs As - Argentina',
          issuerContact: 'hola@estre.ar | www.estre.ar | Cuit: 27-23304147-0',
          issuerTaxLabel: 'Cuit', issuerTaxValue: '27-23304147-0',
          clientName: 'KD Group Spa.', clientAddress: 'Huérfanos 1052, Piso 9 - Santiago - Chile',
          clientTaxLabel: 'RUT', clientTaxValue: '77.060.842-2', clientEmail: '',
          taxName: 'Tax', taxRate: 0,
          paymentMethod: 'Global66\nTransferencia Internacional',
          footerNote: 'Este documento es de uso comercial y no constituye factura fiscal en Argentina.',
          items: [
            { description: 'Diseño y desarrollo de logotipo profesional (a partir de concepto existente).', qty: 1, unitPrice: 450 }
          ]
        }
      };

      // ---------------------------------------------------------------
      // Helpers
      // ---------------------------------------------------------------
      function escapeHtml(str) {
        return String(str == null ? '' : str)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }

      function money(amount, prefix) {
        var n = Number(amount) || 0;
        var formatted = n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        return (prefix || '') + formatted;
      }

      function computeTotals(items, taxRate) {
        var subtotal = items.reduce(function (sum, it) {
          return sum + (Number(it.qty) || 0) * (Number(it.unitPrice) || 0);
        }, 0);
        var taxAmount = subtotal * ((Number(taxRate) || 0) / 100);
        return { subtotal: subtotal, taxAmount: taxAmount, total: subtotal + taxAmount };
      }

      function loadStateIntoForm() {
        var form = document.getElementById('invoice-form');
        Object.keys(state).forEach(function (key) {
          var el = form.elements[key];
          if (el) el.value = state[key];
        });
      }

      function readFormIntoState() {
        var form = document.getElementById('invoice-form');
        Object.keys(state).forEach(function (key) {
          if (key === 'items' || key === 'template') return;
          var el = form.elements[key];
          if (el) state[key] = el.value;
        });
      }

      // ---------------------------------------------------------------
      // Items (dynamic line rows) form rendering
      // ---------------------------------------------------------------
      function renderItemsForm() {
        var container = document.getElementById('items-container');
        container.innerHTML = '';
        state.items.forEach(function (item, index) {
          var row = document.createElement('div');
          row.className = 'item-row';
          row.innerHTML =
            '<input type="text" data-idx="' + index + '" data-field="description" value="' + escapeHtml(item.description) + '" placeholder="Descripción">' +
            '<input type="number" data-idx="' + index + '" data-field="qty" value="' + item.qty + '" min="0" step="1">' +
            '<input type="number" data-idx="' + index + '" data-field="unitPrice" value="' + item.unitPrice + '" min="0" step="0.01">' +
            '<button type="button" class="item-remove" data-remove="' + index + '" title="Quitar línea">&times;</button>';
          container.appendChild(row);
        });
      }

      function addItem() {
        state.items.push({ description: '', qty: 1, unitPrice: 0 });
        renderItemsForm();
        renderPreview();
      }

      function removeItem(index) {
        if (state.items.length <= 1) return;
        state.items.splice(index, 1);
        renderItemsForm();
        renderPreview();
      }

      // ---------------------------------------------------------------
      // Template renderers
      // ---------------------------------------------------------------
      function renderMxItemRows(items, symbol) {
        return items.map(function (it) {
          var amount = (Number(it.qty) || 0) * (Number(it.unitPrice) || 0);
          return '<tr>' +
            '<td>' + escapeHtml(it.description) + '</td>' +
            '<td>' + escapeHtml(it.qty) + '</td>' +
            '<td>' + money(it.unitPrice, symbol) + '</td>' +
            '<td>' + money(amount, symbol) + '</td>' +
            '</tr>';
        }).join('');
      }

      function renderMx(data) {
        var totals = computeTotals(data.items, data.taxRate);
        var symbol = data.currencySymbol || '';
        return '' +
          '<div class="invoice mx">' +
          '<div class="mx-topbar"></div>' +
          '<div class="mx-card">' +
          '<div class="mx-head">' +
          '<div>' +
          '<h1>INVOICE</h1>' +
          '<div class="mx-meta">No. ' + escapeHtml(data.number) + ' · Issue date ' + escapeHtml(data.date) + '</div>' +
          '</div>' +
          '<div class="mx-flag-block">' +
          '<div class="mx-flag"><span></span><span></span><span></span></div>' +
          '<div class="mx-country">' + escapeHtml(data.country) + '</div>' +
          '<div class="mx-currency">' + escapeHtml(data.currencyCode) + '</div>' +
          '</div>' +
          '</div>' +
          '<div class="mx-parties">' +
          '<div class="party">' +
          '<div class="party-label seller">SELLER · ISSUER</div>' +
          '<div class="party-name">' + escapeHtml(data.issuerName) + '</div>' +
          '<div class="party-sub">' + escapeHtml(data.issuerAddress) + '</div>' +
          '<div class="party-sub">' + escapeHtml(data.issuerTaxLabel) + (data.issuerTaxValue ? ': ' + escapeHtml(data.issuerTaxValue) : '') + '</div>' +
          '</div>' +
          '<div class="party">' +
          '<div class="party-label buyer">BUYER · ABROAD</div>' +
          '<div class="party-name">' + escapeHtml(data.clientName) + '</div>' +
          '<div class="party-sub">' + escapeHtml(data.clientAddress) + '</div>' +
          '<div class="party-sub">' + escapeHtml(data.clientTaxLabel) + (data.clientTaxValue ? ': ' + escapeHtml(data.clientTaxValue) : '') + '</div>' +
          '</div>' +
          '</div>' +
          '<table class="mx-table">' +
          '<thead><tr><th>Description</th><th>Qty</th><th>Unit</th><th>Amount</th></tr></thead>' +
          '<tbody>' + renderMxItemRows(data.items, symbol) + '</tbody>' +
          '</table>' +
          '<div class="mx-totals">' +
          '<div class="row"><span>Net</span><span>' + money(totals.subtotal, symbol) + '</span></div>' +
          '<div class="row"><span>' + escapeHtml(data.taxName) + ' ' + escapeHtml(data.taxRate) + '%</span><span>' + money(totals.taxAmount, symbol) + '</span></div>' +
          '<div class="row total"><span>TOTAL</span><span>' + money(totals.total, symbol) + '</span></div>' +
          '</div>' +
          '</div>' +
          '</div>';
      }

      function renderEstrellaItemRows(items, symbol) {
        return items.map(function (it, i) {
          var amount = (Number(it.qty) || 0) * (Number(it.unitPrice) || 0);
          return '<tr>' +
            '<td>' + (i + 1) + '</td>' +
            '<td>' + escapeHtml(it.description) + '</td>' +
            '<td>' + money(it.unitPrice, symbol) + '</td>' +
            '<td>' + money(amount, symbol) + '</td>' +
            '</tr>';
        }).join('');
      }

      function renderEstrella(data) {
        var totals = computeTotals(data.items, data.taxRate);
        var symbol = data.currencySymbol || '';
        return '' +
          '<div class="invoice estrella">' +
          '<div class="est-header">' +
          '<div class="est-brand">' +
          '' +
          '<div>' +
          '<div class="est-company">' + escapeHtml(data.issuerName) + '</div>' +
          '<div class="est-line">' + escapeHtml(data.issuerAddress) + '</div>' +
          '<div class="est-line">' + escapeHtml(data.issuerContact) + '</div>' +
          '</div>' +
          '</div>' +
          '<div class="est-invoice-word">INVOICE</div>' +
          '</div>' +
          '<div class="est-bar">' +
          '<div class="est-bar-left">INVOICE No. ' + escapeHtml(data.number) + '</div>' +
          '<div class="est-bar-right">FECHA: ' + escapeHtml(data.date) + '</div>' +
          '</div>' +
          '<div class="est-client">' +
          '<div class="row highlight"><span class="lbl">Cliente:</span><span>' + escapeHtml(data.clientName) + '</span></div>' +
          '<div class="row"><span class="lbl">Dirección:</span><span>' + escapeHtml(data.clientAddress) + '</span></div>' +
          '<div class="row"><span class="lbl">' + escapeHtml(data.clientTaxLabel) + ':</span><span>' + escapeHtml(data.clientTaxValue) + '</span></div>' +
          '<div class="row"><span class="lbl">Email:</span><span>' + escapeHtml(data.clientEmail) + '</span></div>' +
          '</div>' +
          '<div class="est-section-title">DESCRIPCIÓN DEL SERVICIO</div>' +
          '<table class="est-table">' +
          '<thead><tr><th>Item</th><th>Concepto</th><th>Valor unitario</th><th>Total</th></tr></thead>' +
          '<tbody>' + renderEstrellaItemRows(data.items, symbol) + '</tbody>' +
          '</table>' +
          '<div class="est-bottom">' +
          '<div class="est-payment"><strong>Forma de pago:</strong><br>' + escapeHtml(data.paymentMethod) + '</div>' +
          '<div class="est-totals">' +
          '<div class="row"><span>Subtotal:</span><span>' + money(totals.subtotal, symbol) + '</span></div>' +
          '<div class="row"><span>' + escapeHtml(data.taxName) + ':</span><span>' + escapeHtml(data.taxRate) + '%</span></div>' +
          '<div class="row total"><span>TOTAL:</span><span>' + money(totals.total, symbol) + '</span></div>' +
          '</div>' +
          '</div>' +
          '<div class="est-footer">' +
          '<p>' + escapeHtml(data.footerNote) + '</p>' +
          '<div class="est-wordmark">' + escapeHtml((data.issuerName || '').toUpperCase()) + '</div>' +
          '</div>' +
          '<div class="est-bottombar"><span></span><span></span><span></span></div>' +
          '</div>';
      }

      function renderPreview() {
        readFormIntoState();
        var html = state.template === 'mx' ? renderMx(state) : renderEstrella(state);
        document.getElementById('preview').innerHTML = html;
      }

      // ---------------------------------------------------------------
      // Template switching
      // ---------------------------------------------------------------
      function setTemplate(tpl) {
        state.template = tpl;
        document.getElementById('btn-tpl-mx').classList.toggle('active', tpl === 'mx');
        document.getElementById('btn-tpl-estrella').classList.toggle('active', tpl === 'estrella');
        document.querySelectorAll('[data-only]').forEach(function (el) {
          el.style.display = el.getAttribute('data-only') === tpl ? '' : 'none';
        });
        renderPreview();
      }

      function loadExample(tpl) {
        var example = JSON.parse(JSON.stringify(EXAMPLES[tpl]));
        Object.assign(state, example);
        loadStateIntoForm();
        renderItemsForm();
        setTemplate(tpl);
      }

      // ---------------------------------------------------------------
      // Export to PDF (native browser print, no external dependencies)
      // ---------------------------------------------------------------
      function exportToPdf() {
        readFormIntoState();
        renderPreview();
        var safeNumber = (state.number || 'factura').replace(/[^a-z0-9_\-]+/gi, '_');
        var previousTitle = document.title;
        document.title = 'factura_' + safeNumber;
        window.addEventListener('afterprint', function restoreTitle() {
          document.title = previousTitle;
          window.removeEventListener('afterprint', restoreTitle);
        });
        window.print();
      }

      // ---------------------------------------------------------------
      // Event wiring
      // ---------------------------------------------------------------
      document.getElementById('invoice-form').addEventListener('input', renderPreview);

      document.getElementById('items-container').addEventListener('input', function (e) {
        var idx = e.target.getAttribute('data-idx');
        var field = e.target.getAttribute('data-field');
        if (idx === null || !field) return;
        var value = field === 'description' ? e.target.value : Number(e.target.value);
        state.items[Number(idx)][field] = value;
        renderPreview();
      });

      document.getElementById('items-container').addEventListener('click', function (e) {
        var idx = e.target.getAttribute('data-remove');
        if (idx !== null) removeItem(Number(idx));
      });

      document.getElementById('btn-add-item').addEventListener('click', addItem);
      document.getElementById('btn-export-pdf').addEventListener('click', exportToPdf);
      document.getElementById('btn-example').addEventListener('click', function () { loadExample(state.template); });
      document.getElementById('btn-tpl-mx').addEventListener('click', function () { setTemplate('mx'); });
      document.getElementById('btn-tpl-estrella').addEventListener('click', function () { setTemplate('estrella'); });

      // ---------------------------------------------------------------
      // Init
      // ---------------------------------------------------------------
      loadExample('mx');
    })();
  </script>
</body>

</html>
